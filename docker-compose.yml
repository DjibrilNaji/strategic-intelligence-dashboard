services:
  postgres:
    image: postgres:16-alpine
    container_name: sid_postgres
    environment:
      POSTGRES_USER: sid_user
      POSTGRES_PASSWORD: sid_password
      POSTGRES_DB: sid_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sid_user -d sid_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
